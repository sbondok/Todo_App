<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A modern, responsive Todo application with dark and light themes, drag-and-drop reordering, and local storage persistence.">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Todo app</title>
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <!-- Background image area -->
  <div class="bg-image" aria-hidden="true"></div>

  <main class="app-container">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <h1 class="app-title">TODO</h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme">
        <img src="/images/icon-sun.svg" alt="" class="theme-icon" id="theme-icon">
      </button>
    </header>

    <!-- New Todo Input -->
    <div class="todo-input-card" id="todo-input-card">
      <div class="checkbox-circle" aria-hidden="true"></div>
      <input 
        type="text" 
        class="todo-input" 
        id="todo-input" 
        placeholder="Create a new todo..." 
        autocomplete="off"
        aria-label="Create a new todo"
      >
    </div>

    <!-- Todo List -->
    <section class="todo-panel" id="todo-panel">
      <ul class="todo-list" id="todo-list" role="list" aria-label="Todo items">
        <!-- Todo items rendered by JS -->
      </ul>

      <!-- Status Bar (Desktop: inline filters, Mobile: items left + clear only) -->
      <div class="todo-status-bar" id="todo-status-bar">
        <span class="items-left" id="items-left">0 items left</span>
        <div class="filters desktop-filters" id="desktop-filters">
          <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
          <button class="filter-btn" data-filter="active" id="filter-active">Active</button>
          <button class="filter-btn" data-filter="completed" id="filter-completed">Completed</button>
        </div>
        <button class="clear-completed-btn" id="clear-completed">Clear Completed</button>
      </div>
    </section>

    <!-- Mobile Filters (separate card) -->
    <div class="filters-card mobile-filters" id="mobile-filters">
      <button class="filter-btn active" data-filter="all" id="filter-all-mobile">All</button>
      <button class="filter-btn" data-filter="active" id="filter-active-mobile">Active</button>
      <button class="filter-btn" data-filter="completed" id="filter-completed-mobile">Completed</button>
    </div>

    <!-- Drag hint -->
    <p class="drag-hint" id="drag-hint">Drag and drop to reorder list</p>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/sbondok" target="_blank" rel="noopener">sbondok</a>.
  </footer>
</body>
</html>
